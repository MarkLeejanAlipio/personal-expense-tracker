<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="header">
            <h2>Daily Expenses</h2>
            <p>Track what you spend today</p>
        </div>
        <div class="expense-container">
            <div class="expense-calculate">
                <div class="calculate total">
                    <p class="calculate-name">TOTAL</p>
                    <p class="total">$0.00</p>
                </div>
                <div class="calculate average">
                    <p class="calculate-name">AVERAGE</p>
                    <p class="average">$0.00</p>
                </div>                
            </div>
            <div class="expense-add">
                <p class="expense-name">ADD EXPENSE</p>
                <form class="expense-add-container">
                    <input class="expense" type="text" placeholder="e.g. Lunch">
                    <input class="amount" type="number" placeholder="Amount">
                    <button class="expense-add-btn">Add</button>
                </form>
            </div>
            <div class="expense-tracker">
                <div class="tracker-top">
                    <p>TODAY'S EXPENSES</p>
                    <button class="tracker-btn">Clear All</button>
                </div>
                <div class="tracker-placeholder">No expenses yet - add one above</div>
            </div>
        </div>
    </main>
</body>
</html>
